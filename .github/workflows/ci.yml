name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    name: Lint and checks
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: tree
          POSTGRES_DB: tree
          POSTGRES_PASSWORD: test-only
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.12'

      - name: Ruff lint
        run: uvx ruff check .

      - name: Ruff format
        run: uvx ruff format --check .

      - name: Mypy
        run: uv run python -m mypy

      - name: Django system check
        run: uv run python -m django check --settings=tests.settings

      - name: Check for missing migrations
        run: >-
          uv run python -m django makemigrations
          --check --dry-run --settings=tests.settings

  test:
    name: Python ${{ matrix.python-version }} / Django ${{ matrix.django.name }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
        django:
          - name: '4.2'
            spec: 'Django>=4.2,<5.0'
          - name: '5.2'
            spec: 'Django>=5.2,<6.0'
          - name: '6.0'
            spec: 'Django>=6.0,<6.1'
        exclude:
          # Django 4.2 supports Python 3.8-3.12.
          - python-version: '3.13'
            django: {name: '4.2', spec: 'Django>=4.2,<5.0'}
          - python-version: '3.14'
            django: {name: '4.2', spec: 'Django>=4.2,<5.0'}
          # Django 6.0 requires Python 3.12+.
          - python-version: '3.10'
            django: {name: '6.0', spec: 'Django>=6.0,<6.1'}
          - python-version: '3.11'
            django: {name: '6.0', spec: 'Django>=6.0,<6.1'}

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: tree
          POSTGRES_DB: tree
          POSTGRES_PASSWORD: test-only
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests with coverage
        run: >-
          uv run
          --with "${{ matrix.django.spec }}"
          --with coverage
          coverage run --source=tree run_tests.py

      - name: Generate coverage report
        run: uv run --with coverage coverage xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false

  test-sqlite:
    name: SQLite / Django ${{ matrix.django.name }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        django:
          - name: '4.2'
            spec: 'Django>=4.2,<5.0'
          - name: '5.2'
            spec: 'Django>=5.2,<6.0'
          - name: '6.0'
            spec: 'Django>=6.0,<6.1'

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.12'

      - name: Run tests with coverage
        env:
          TREE_DB_ENGINE: sqlite
        run: >-
          uv run --with "${{ matrix.django.spec }}" --with coverage
          coverage run --source=tree run_tests.py

      - name: Generate coverage report
        run: uv run --with coverage coverage xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false

  test-mysql:
    name: MySQL / Django ${{ matrix.django.name }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        django:
          - name: '4.2'
            spec: 'Django>=4.2,<5.0'
          - name: '5.2'
            spec: 'Django>=5.2,<6.0'
          - name: '6.0'
            spec: 'Django>=6.0,<6.1'

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_DATABASE: tree
          MYSQL_USER: tree
          MYSQL_PASSWORD: test-only
          MYSQL_ROOT_PASSWORD: root-only
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot -proot-only"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.12'

      - name: Install MySQL client build dependencies
        run: >-
          sudo apt-get update
          && sudo apt-get install -y pkg-config default-libmysqlclient-dev

      - name: Run tests
        env:
          TREE_DB_ENGINE: mysql
          TREE_DB_HOST: 127.0.0.1
          TREE_DB_PORT: '3306'
          TREE_DB_NAME: tree
          # The test runner creates `test_tree`, which needs CREATE privileges.
          TREE_DB_USER: root
          TREE_DB_PASSWORD: root-only
        run: >-
          uv run --with "${{ matrix.django.spec }}" --with mysqlclient
          --with coverage coverage run --source=tree run_tests.py

      - name: Generate coverage report
        run: uv run --with coverage coverage xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false

  test-oracle:
    name: Oracle / Django ${{ matrix.django.name }}
    runs-on: ubuntu-latest

    # The pure-Python `oracledb` driver (thin mode, no Instant Client) is only
    # supported by Django 5.0+; 4.2 would require `cx_Oracle` + native libraries.
    strategy:
      fail-fast: false
      matrix:
        django:
          - name: '5.2'
            spec: 'Django>=5.2,<6.0'
          - name: '6.0'
            spec: 'Django>=6.0,<6.1'

    steps:
      - uses: actions/checkout@v5

      - name: Start Oracle Database Free
        uses: gvenzl/setup-oracle-free@v1
        with:
          oracle-password: test-only

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.12'

      - name: Run tests
        env:
          TREE_DB_ENGINE: oracle
          TREE_DB_NAME: localhost:1521/FREEPDB1
          # Connect as a DBA so the test runner can create the test user/tablespace.
          TREE_DB_USER: system
          TREE_DB_PASSWORD: test-only
        run: >-
          uv run --with "${{ matrix.django.spec }}" --with oracledb
          --with coverage coverage run --source=tree run_tests.py

      - name: Generate coverage report
        run: uv run --with coverage coverage xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false
